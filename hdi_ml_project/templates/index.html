<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HDI Prediction System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h2>HDI Capability Prediction Dashboard</h2>
        <p>Input country dimension targets below to simulate developmental tracking metrics.</p>
        
        <form action="/" method="post">
            <div class="form-group">
                <label>Life Expectancy at Birth (Years: 20 - 85):</label>
                <input type="number" step="0.1" name="life_expectancy" required value="72.5">
            </div>
            <div class="form-group">
                <label>Mean Years of Schooling (Years: 0 - 15):</label>
                <input type="number" step="0.1" name="mean_schooling" required value="8.5">
            </div>
            <div class="form-group">
                <label>Expected Years of Schooling (Years: 0 - 18):</label>
                <input type="number" step="0.1" name="expected_schooling" required value="12.0">
            </div>
            <div class="form-group">
                <label>GNI per Capita (PPP $ Value: 100 - 75000):</label>
                <input type="number" step="1" name="gni_per_capita" required value="15000">
            </div>
            <button type="submit" class="btn">Execute Model Prediction</button>
        </form>

        {% if prediction %}
        <div class="results">
            <h3>{{ prediction }}</h3>
            <h4>{{ tier }}</h4>
        </div>
        {% endif %}
    </div>
</body>
</html>
